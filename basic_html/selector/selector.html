<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 선택자 데모</title>
    <link rel="stylesheet" href="./css/selector.css" />
    <!-- Google Fonts (Noto Sans KR 추천) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- 후손 선택자 -->
     <!-- 시멘틱 태그(의미론적 태그) : 단락을 나타냄-->
     <section>
      <h3>ul li -- 후손 선택자</h3>
      <ul>
        <li>사과</li>
        <li>배</li>
        <li>수박</li>
      </ul>
     </section>
     <section>
      <h3>가상클래스</h3>
      <a href="https://www.naver.com">네이버</a>
      <a href="https://www.daum.net">카카오</a>
     </section>
     <section>
      <!-- 가상클래스 : first-child / last-child / nth-child -->
       <h3>first-child / last-child / nth-child(2)</h3>
       <ul class="group-list">
        <li>IVE</li>
        <li>aespa</li>
        <li>NewJeans</li>
       </ul>
     </section>
     <section>
      <input type="checkbox">
      <input type="radio">
      <input type="text" placeholder="적어 보세요">
      <input type="text">
      <input type="text">
      <input type="button" value="눌러">     
    </section>
  </body>
</html>
